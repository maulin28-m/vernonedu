services:

  app:
    build: .
    container_name: vernonedu-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    depends_on:
      - mysql
    command: >
      sh -c "
      composer install &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000 --no-reload
      "

  vite:
    build: .
    container_name: vernonedu-vite
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
      - /var/www/node_modules
    depends_on:
      - app
    command: sh -c "npm install && npm run dev -- --host"

  reverb:
    build: .
    container_name: vernonedu-reverb
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    depends_on:
      - app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

  queue:
    build: .
    container_name: vernonedu-queue
    volumes:
      - .:/var/www
      - /var/www/node_modules
      - /var/www/vendor
    depends_on:
      - app
    command: php artisan queue:work --sleep=1

  mysql:
    image: mysql:8.0
    container_name: vernonedu-mysql
    restart: always
    environment:
      MYSQL_DATABASE: vernonedu
      MYSQL_ROOT_PASSWORD: root
    #daffa ganti port 3307 mysql
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mailpit:
    image: 'axllent/mailpit:latest'
    container_name: vernonedu-mailpit
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    networks:
      - default

volumes:
  mysql_data:

